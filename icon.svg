      C 300 780, 280 700, 295 610
      C 310 520, 360 450, 420 390
      C 480 330, 540 280, 570 220
      C 595 168, 590 118, 565 90
      C 548 70, 525 62, 500 65
      C 465 70, 445 95, 438 128
